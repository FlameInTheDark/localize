<!doctype html>
<html lang="en" suppressHydrationWarning>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <title>Localize — AI Translation</title>
    <meta
      name="description"
      content="Translate text into any language instantly. Clean, fast, AI-powered translation inspired by DeepL."
    />
    <!-- Prevent theme flash: apply the stored/system color scheme before paint. -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem("theme");
          if (t === "dark" || (!t && window.matchMedia("(prefers-color-scheme: dark)").matches)) {
            document.documentElement.classList.add("dark");
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
